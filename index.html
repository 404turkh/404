<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HaramBro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <script>
    (function () {
      try {
        var saved = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = saved || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {}
    })();
  </script>
</head>
<body>

  <header class="site-header">
    <nav class="navbar">
      <div class="nav-left">
        <img src="images/a.GIF" class="nav-logo" alt="HaramBro Logo">
        <div class="brand-text">
          <h1>HaramBro</h1>
          <p>iOS Apps & Tools Library</p>
        </div>
      </div>

      <div class="nav-right">
        <div class="nav-links">
          <a href="index.html" class="nav-link active">Home</a>
          <a href="agarioskins.html" class="nav-link">Agario Skins</a>
        </div>

        <button class="theme-switch" id="themeToggle" type="button" aria-label="Theme Switch">
          <span class="switch-track"></span>
          <span class="switch-knob"></span>
        </button>

        <button class="haram-btn" type="button">Haram Bro</button>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-content">
        <span class="hero-badge">Library</span>
        <h2 id="activeCategoryLabel">ESign</h2>
        <p id="activeCategoryDesc">Browse ESign certificates, profiles, signing resources, and DNS profiles.</p>
      </div>
    </section>

    <section class="tabs-section">
      <div class="tabs-wrap">
        <button class="tab" type="button" data-list="list1">Ksing</button>
        <button class="tab active" type="button" data-list="list2">ESign</button>
        <button class="tab" type="button" data-list="list3">Agario Modes</button>
        <button class="tab" type="button" data-list="list4">Game Apps</button>
        <button class="tab" type="button" data-list="list5">Apps</button>
      </div>
    </section>
  </header>

  <main class="page-shell">
    <section class="content-header">
      <div>
        <p class="section-kicker">Current Category</p>
        <h3 id="activeCategoryTitle">ESign</h3>
      </div>
      <div class="section-count">
        <span id="itemCount">0 items</span>
      </div>
    </section>

    <div id="lists" class="list"></div>
  </main>

  <footer>
    <div class="footer-box">
      <div class="footer-card">
        <h3>About Harambro</h3>
        <p>Harambro provides modded iOS apps & IPA tools.</p>
      </div>
      <div class="footer-card">
        <h3>Support</h3>
        <p>Email • Telegram • Contact</p>
      </div>
    </div>
    <p class="copy">© 2026 Harambro</p>
  </footer>

  <script>
    (function () {
      var btn = document.getElementById("themeToggle");
      function setTheme(t) {
        document.documentElement.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
      }
      btn.addEventListener("click", function () {
        var current = document.documentElement.getAttribute("data-theme");
        setTheme(current === "dark" ? "light" : "dark");
      });
    })();
  </script>

  <script src="https://pl28704305.effectivegatecpm.com/b8/c7/a3/b8c7a3140347cf78cfb6c89174a952f0.js" async></script>
  <script src="js/app.js"></script>
</body>
</html>
